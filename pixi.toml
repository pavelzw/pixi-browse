[workspace]
name = "pixi-browse"
channels = ["conda-forge", "https://prefix.dev/skill-forge"]
platforms = ["osx-arm64", "osx-64", "linux-64", "win-64"]
preview = ["pixi-build"]

[tasks]
demo = "vhs .github/assets/demo-dark.tape && vhs .github/assets/demo-light.tape"

[package]
name = "pixi-browse"
[package.build.backend]
name = "pixi-build-python"
version = "*"
[package.host-dependencies]
python = ">=3.13"
hatchling = "*"
[package.run-dependencies]
textual = ">=8.0.2,<9"
pyyaml = ">=6.0.3,<7"
py-rattler = ">=0.23.1,<0.24"
typer = ">=0.24.0,<0.25"
[dependencies]
pixi-browse = { path = "." }

[feature.test.dependencies]
pytest = "*"
pytest-cov = "*"
mypy = "*"
ty = "*"
types-pyyaml = "*"
vhs = "*"
[feature.test.tasks]
test = "pytest"
test-coverage = "pytest --cov=pixi_browse --cov-report=xml --cov-report=term-missing"

[feature.build.dependencies]
python = "*"
hatchling = "*"
python-build = "*"
twine = ">=6"
[feature.build.tasks]
build-wheel = "python -m build --no-isolation ."
check-wheel = "twine check dist/*"

[feature.dev.dependencies]
agent-skill-textual = "*"
# agent-skill-py-rattler = "*"
agent-skill-py-rattler = { git = "https://github.com/pavelzw/rattler", branch = "skills", subdirectory = "skills/py-rattler" }

[feature.lint.dependencies]
lefthook = "*"
docformatter = "*"
ruff = "*"
prettier = "*"
taplo = "*"
pre-commit-hooks = "*"
typos = "*"
zizmor = "*"
[feature.lint.tasks]
pre-commit-install = "lefthook install"
lint = "lefthook run pre-commit --all-files"

[feature.py313.dependencies]
python = "3.13.*"
[feature.py314.dependencies]
python = "3.14.*"

[environments]
default = ["test", "build", "lint", "dev"]
py313 = ["py313", "test"]
py314 = ["py314", "test"]
